<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Student Result Calculator</h2>

        <input type="number" id="m1" placeholder="Marks 1">
        <input type="number" id="m2" placeholder="Marks 2">
        <input type="number" id="m3" placeholder="Marks 3">
        <input type="number" id="m4" placeholder="Marks 4">
        <input type="number" id="m5" placeholder="Marks 5">

        <button onclick="calculate()">Calculate</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
